<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍌 BananZa — Login</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0e1621;color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#17212b;border-radius:12px;padding:40px;width:100%;max-width:400px;margin:20px}
    .logo{text-align:center;margin-bottom:24px}
    .logo h1{font-size:32px;margin-bottom:4px}
    .logo p{color:#7e8b99;font-size:14px}
    .tabs{display:flex;margin-bottom:24px;border-bottom:2px solid #242f3d}
    .tab{flex:1;text-align:center;padding:10px;cursor:pointer;color:#7e8b99;font-size:14px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
    .tab.active{color:#5eb5f7;border-bottom-color:#5eb5f7}
    .form{display:none}
    .form.active{display:block}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;color:#7e8b99;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .field input{width:100%;padding:12px 14px;background:#242f3d;border:1px solid #3a4a5c;border-radius:8px;color:#f5f5f5;font-size:15px;outline:none;transition:.2s}
    .field input:focus{border-color:#5eb5f7}
    .btn{width:100%;padding:12px;background:#5eb5f7;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-top:8px}
    .btn:hover{background:#4aa3e5}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .error{color:#e17076;font-size:13px;margin-top:8px;min-height:18px}
    .hint{color:#7e8b99;font-size:12px;margin-top:12px;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🍌 BananZa</h1>
      <p>Self-hosted messenger</p>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="login">Sign In</div>
      <div class="tab" data-tab="register">Sign Up</div>
    </div>

    <form class="form active" id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="loginUser" autocomplete="username" maxlength="20" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPass" autocomplete="current-password" maxlength="100" required>
      </div>
      <button class="btn" type="submit">Sign In</button>
      <div class="error" id="loginError"></div>
    </form>

    <form class="form" id="registerForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="regUser" autocomplete="username" maxlength="20" required>
      </div>
      <div class="field">
        <label>Display Name (optional)</label>
        <input type="text" id="regName" maxlength="30">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="regPass" autocomplete="new-password" maxlength="100" required>
      </div>
      <button class="btn" type="submit">Create Account</button>
      <div class="error" id="regError"></div>
      <div class="hint">First registered user becomes admin</div>
    </form>
  </div>

  <script>
    if (localStorage.getItem('token')) location.href = '/';

    const tabs = document.querySelectorAll('.tab');
    const forms = document.querySelectorAll('.form');
    tabs.forEach(t => t.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('active'));
      forms.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById(t.dataset.tab + 'Form').classList.add('active');
    }));

    async function api(url, body) {
      const r = await fetch(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Error');
      return data;
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('loginError');
      err.textContent = '';
      try {
        const data = await api('/api/auth/login', {
          username: document.getElementById('loginUser').value.trim(),
          password: document.getElementById('loginPass').value,
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        location.href = '/';
      } catch (ex) { err.textContent = ex.message; }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('regError');
      err.textContent = '';
      try {
        const data = await api('/api/auth/register', {
          username: document.getElementById('regUser').value.trim(),
          password: document.getElementById('regPass').value,
          displayName: document.getElementById('regName').value.trim(),
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        location.href = '/';
      } catch (ex) { err.textContent = ex.message; }
    });
  </script>
</body>
</html>
