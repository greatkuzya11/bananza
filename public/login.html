<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍌 BananZa — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍌</text></svg>">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0e1621;color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#17212b;border-radius:12px;padding:40px;width:100%;max-width:400px;margin:20px}
    .logo{text-align:center;margin-bottom:24px}
    .logo h1{font-size:32px;margin-bottom:4px}
    .logo p{color:#7e8b99;font-size:14px}
    .tabs{display:flex;margin-bottom:24px;border-bottom:2px solid #242f3d}
    .tab{flex:1;text-align:center;padding:10px;cursor:pointer;color:#7e8b99;font-size:14px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
    .tab.active{color:#5eb5f7;border-bottom-color:#5eb5f7}
    .form{display:none}
    .form.active{display:block}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;color:#7e8b99;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .field input{width:100%;padding:12px 14px;background:#242f3d;border:1px solid #3a4a5c;border-radius:8px;color:#f5f5f5;font-size:15px;outline:none;transition:.2s}
    .field input:focus{border-color:#5eb5f7}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:44px}
    .pw-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#9fb7cf;cursor:pointer;font-size:16px;padding:6px;border-radius:6px}
    .pw-toggle:active{color:#5eb5f7}
    .pw-toggle:focus{outline:2px solid #5eb5f7}
    .btn{width:100%;padding:12px;background:#5eb5f7;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-top:8px}
    .btn:hover{background:#4aa3e5}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .error{color:#e17076;font-size:13px;margin-top:8px;min-height:18px}
    .hint{color:#7e8b99;font-size:12px;margin-top:12px;text-align:center}
    .language-switch{display:flex;gap:8px;justify-content:center;margin:-8px 0 18px}
    .language-switch button{background:#242f3d;border:1px solid #3a4a5c;color:#9fb7cf;border-radius:999px;padding:6px 12px;cursor:pointer;font-weight:700}
    .language-switch button.active{background:#5eb5f7;border-color:#5eb5f7;color:#fff}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🍌 BananZa</h1>
      <p>Self-hosted messenger</p>
    </div>
    <div class="language-switch" aria-label="Interface language">
      <button type="button" data-login-language="ru">RU</button>
      <button type="button" data-login-language="en">EN</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="login">Sign In</div>
      <div class="tab" data-tab="register">Sign Up</div>
    </div>

    <form class="form active" id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="loginUser" autocomplete="username" maxlength="20" required>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="loginPass" autocomplete="current-password" maxlength="100" required>
          <button type="button" class="pw-toggle" data-target="loginPass" aria-label="Show password">👁️</button>
        </div>
      </div>
      <button class="btn" type="submit">Sign In</button>
      <div class="error" id="loginError"></div>
    </form>

    <form class="form" id="registerForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="regUser" autocomplete="username" maxlength="20" required>
      </div>
      <div class="field">
        <label>Display Name (optional)</label>
        <input type="text" id="regName" maxlength="30">
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="regPass" autocomplete="new-password" maxlength="100" required>
          <button type="button" class="pw-toggle" data-target="regPass" aria-label="Show password">👁️</button>
        </div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="regPassConfirm" autocomplete="new-password" maxlength="100" required>
          <button type="button" class="pw-toggle" data-target="regPassConfirm" aria-label="Show password">👁️</button>
        </div>
      </div>
      <button class="btn" type="submit">Create Account</button>
      <div class="error" id="regError"></div>
      <div class="hint">First registered user becomes admin</div>
    </form>

    <div id="successOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center">
      <div style="background:#17212b;border-radius:12px;padding:32px 40px;text-align:center;max-width:360px">
        <div style="font-size:48px;margin-bottom:12px">🎉</div>
        <h2 style="margin-bottom:8px">Registration Successful!</h2>
        <p style="color:#7e8b99;margin-bottom:20px">Welcome to BananZa. Redirecting to chat...</p>
        <div class="btn" id="successGoBtn">Go to Chat</div>
      </div>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script>
    const i18n = window.BananzaI18n;
    if (localStorage.getItem('token')) location.href = '/';
    function t(key){ return i18n?.t ? i18n.t(key) : key; }
    function tx(text){ return i18n?.text ? i18n.text(text) : text; }
    function selectedLanguage(){ return i18n?.getLanguage?.() || 'ru'; }
    function syncLanguageButtons(){
      document.querySelectorAll('[data-login-language]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.loginLanguage === selectedLanguage());
      });
    }
    document.querySelectorAll('[data-login-language]').forEach(btn => {
      btn.addEventListener('click', () => {
        i18n?.setLanguage?.(btn.dataset.loginLanguage);
        syncLanguageButtons();
      });
    });
    syncLanguageButtons();

    const tabs = document.querySelectorAll('.tab');
    const forms = document.querySelectorAll('.form');
    tabs.forEach(t => t.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('active'));
      forms.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById(t.dataset.tab + 'Form').classList.add('active');
    }));

    async function api(url, body) {
      const r = await fetch(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(tx(data.error || 'Error'));
      return data;
    }

    async function syncServerLanguage(token, user) {
      const language = selectedLanguage();
      if (!token || user?.ui_language === language) return user;
      try {
        const response = await fetch('/api/user/language', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
          },
          body: JSON.stringify({ language }),
        });
        const data = await response.json().catch(() => ({}));
        return response.ok && data.user ? data.user : user;
      } catch {
        return user;
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('loginError');
      err.textContent = '';
      try {
        const data = await api('/api/auth/login', {
          username: document.getElementById('loginUser').value.trim(),
          password: document.getElementById('loginPass').value,
        });
        const user = await syncServerLanguage(data.token, data.user);
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(user));
        location.href = '/';
      } catch (ex) { err.textContent = ex.message; }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('regError');
      err.textContent = '';
      const pass = document.getElementById('regPass').value;
      const passConfirm = document.getElementById('regPassConfirm').value;
      if (pass !== passConfirm) { err.textContent = t('Passwords do not match'); return; }
      try {
        const data = await api('/api/auth/register', {
          username: document.getElementById('regUser').value.trim(),
          password: pass,
          displayName: document.getElementById('regName').value.trim(),
          language: selectedLanguage(),
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        const overlay = document.getElementById('successOverlay');
        overlay.style.display = 'flex';
        document.getElementById('successGoBtn').addEventListener('click', () => { location.href = '/'; });
        setTimeout(() => { location.href = '/'; }, 3000);
      } catch (ex) { err.textContent = ex.message; }
    });

    // Press-to-show password buttons: show while pressed (pointer/touch), fallback click briefly
    (function setupPasswordToggles(){
      function showInput(id){
        const el = document.getElementById(id); if (!el) return; el.type = 'text';
      }
      function hideInput(id){
        const el = document.getElementById(id); if (!el) return; el.type = 'password';
      }
      document.querySelectorAll('.pw-toggle').forEach(btn => {
        const target = btn.dataset.target;
        if (!target) return;
        // pointer events (covers mouse + stylus + touch where supported)
        btn.addEventListener('pointerdown', (ev) => { ev.preventDefault(); showInput(target); });
        btn.addEventListener('pointerup', (ev) => { ev.preventDefault(); hideInput(target); });
        btn.addEventListener('pointercancel', () => hideInput(target));
        btn.addEventListener('mouseleave', () => hideInput(target));
        // extra touch handlers for older browsers
        btn.addEventListener('touchstart', (ev) => { ev.preventDefault(); showInput(target); }, { passive: false });
        btn.addEventListener('touchend', (ev) => { ev.preventDefault(); hideInput(target); }, { passive: false });
        // fallback click: toggle briefly for accessibility (500ms)
        btn.addEventListener('click', (ev) => {
          ev.preventDefault(); const inp = document.getElementById(target); if (!inp) return;
          if (inp.type === 'password') { inp.type = 'text'; setTimeout(() => hideInput(target), 500); } else hideInput(target);
        });
      });
    })();
  </script>
</body>
</html>
