<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🍌 BananZa</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <button id="menuBtn" class="icon-btn" title="Menu">☰</button>
        <h2>🍌 BananZa</h2>
        <button id="newChatBtn" class="icon-btn" title="New chat">✎</button>
      </div>
      <div class="sidebar-search">
        <input type="text" id="chatSearch" placeholder="Search chats...">
      </div>
      <div id="chatList" class="chat-list"></div>
      <div class="sidebar-footer">
        <div id="currentUserInfo" class="current-user"></div>
        <button id="adminBtn" class="icon-btn hidden" title="Admin panel">⚙</button>
        <button id="logoutBtn" class="icon-btn" title="Logout">⏻</button>
      </div>
    </aside>

    <!-- Chat area -->
    <main id="chatArea">
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">🍌</div>
        <h3>Welcome to BananZa</h3>
        <p>Select a chat to start messaging</p>
      </div>

      <div id="chatView" class="chat-view hidden">
        <div class="chat-header">
          <button id="backBtn" class="icon-btn mobile-only">←</button>
          <div class="chat-header-info">
            <div id="chatTitle" class="chat-title"></div>
            <div id="chatStatus" class="chat-status"></div>
          </div>
          <button id="chatInfoBtn" class="icon-btn" title="Chat info">ℹ</button>
        </div>

        <div id="messages" class="messages">
          <div id="loadMoreWrap" class="load-more hidden">
            <button id="loadMoreBtn">Load earlier messages</button>
          </div>
        </div>

        <div id="typingBar" class="typing-bar hidden"></div>

        <div class="input-area">
          <div id="pendingFile" class="pending-file hidden"></div>
          <div class="input-row">
            <button id="attachBtn" class="icon-btn" title="Attach file">📎</button>
            <button id="emojiBtn" class="icon-btn" title="Emoji">😊</button>
            <textarea id="msgInput" placeholder="Message..." rows="1"></textarea>
            <button id="sendBtn" class="icon-btn send-btn" title="Send">➤</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Emoji Picker -->
  <div id="emojiPicker" class="emoji-picker hidden"></div>

  <!-- Image Viewer -->
  <div id="imageViewer" class="image-viewer hidden">
    <button class="iv-close">✕</button>
    <img id="ivImage" src="" alt="">
  </div>

  <!-- New Chat Modal -->
  <div id="newChatModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>New Chat</h3>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-tabs">
        <div class="modal-tab active" data-tab="private">Private</div>
        <div class="modal-tab" data-tab="group">Group</div>
      </div>
      <div class="modal-body">
        <div id="privateTab" class="tab-pane active">
          <div id="userListPrivate" class="user-list"></div>
        </div>
        <div id="groupTab" class="tab-pane">
          <input type="text" id="groupName" placeholder="Group name" maxlength="50" class="modal-input">
          <div id="userListGroup" class="user-list checkable"></div>
          <button id="createGroupBtn" class="btn-primary">Create Group</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Admin Panel Modal -->
  <div id="adminModal" class="modal hidden">
    <div class="modal-content wide">
      <div class="modal-header">
        <h3>Admin Panel</h3>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div id="adminUserList" class="admin-user-list"></div>
      </div>
    </div>
  </div>

  <!-- Chat Info Modal -->
  <div id="chatInfoModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="chatInfoTitle">Chat Info</h3>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <h4 style="margin-bottom:12px;color:#7e8b99">Members</h4>
        <div id="chatMemberList" class="user-list"></div>
        <div id="addMemberWrap" class="hidden" style="margin-top:16px">
          <h4 style="margin-bottom:12px;color:#7e8b99">Add Member</h4>
          <div id="addMemberList" class="user-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Menu Drawer -->
  <div id="menuDrawer" class="modal hidden">
    <div class="modal-content narrow">
      <div class="modal-header">
        <h3>Menu</h3>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body menu-body">
        <div id="menuUserInfo" class="menu-user-info"></div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" class="hidden" accept=".jpg,.jpeg,.png,.webp,.gif,.pdf,.txt,.doc,.docx,.xls,.xlsx,.zip,.mp3,.wav,.ogg,.m4a,.mp4,.webm,.mov">

  <script src="/js/app.js"></script>
</body>
</html>
